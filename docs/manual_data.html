<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Data Dump</title>
  <link rel="stylesheet" href="css/matstheme.css" />
  <style>
    /* Layout Logic */
    .row { display: flex; gap: 16px; margin-bottom: 20px; }
    .row > div { flex: 1; }
    
    /* Ensure form elements match matstheme.css variables */
    label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
    
    select, input, textarea {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      color: var(--text-main);
      padding: 10px;
      font-family: inherit;
      border-radius: 4px;
    }

    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-green);
    }

    textarea { height: 200px; resize: none; }

    button {
      background: var(--accent-green);
      color: var(--background);
      border: none;
      padding: 12px 24px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
      margin-top: 20px;
      text-transform: uppercase;
    }

    button:hover { opacity: 0.9; }
    button:disabled { background: var(--text-muted); cursor: not-allowed; }

    #out {
      margin-top: 20px;
      color: var(--accent-yellow);
      font-family: monospace;
      text-align: center;
    }

    h2 { color: var(--accent-green); border-bottom: 1px solid var(--border-soft); padding-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">

    <h2>Data Dump</h2>

    <div class="row">
      <div>
        <label for="league">League</label>
        <select id="league" onchange="updateMarkets()">
          <option value="">-- select --</option>
          <option value="basketball">Basketball</option>
          <option value="football">Football</option>
          <option value="baseball">Baseball</option>
          <option value="hockey">Hockey</option>
          <option value="soccer">Soccer</option>
          <option value="final_scores">Final Scores</option>
          <option value="final_soccer_scores">Final Soccer Scores</option>
        </select>
      </div>

      <div>
        <label for="market">Market</label>
        <select id="market">
          <option value="">-- placeholder --</option>
        </select>
      </div>

      <div>
        <label for="source">Source</label>
        <select id="source">
          <option value="">-- select --</option>
          <option value="DraftKings">DraftKings</option>
          <option value="Predictions">Predictions</option>
          <option value="Scores">Scores</option>
        </select>
      </div>
    </div>

    <label for="token">Magic</label>
    <input id="token" type="password" placeholder="Enter Magic Here" />

    <label for="raw" style="margin-top:20px;">Raw Text</label>
    <textarea id="raw" placeholder="Paste text here..."></textarea>

    <button id="btn" onclick="dispatch()">Create File</button>

    <div id="out"></div>

  </div>

  <script>
    const OWNER = "Clownworldenjoyer76";
    const REPO  = "bet_tracker";
    const WORKFLOW_FILE = "_00_manual_data.yml";
    const REF = "main";

    const MARKET_MAP = {
      basketball: ["NBA", "NCAA Men"],
      football: ["NFL", "NCAA", "CFL"],
      baseball: ["MLB"],
      hockey: ["NHL"],
      soccer: ["MLS", "EPL", "Ligue 1", "Serie A", "La Liga", "Bundesliga"],
      final_scores: ["NBA", "NCAAB", "NHL"],
      final_soccer_scores: [
        { val: "epl", text: "EPL" },
        { val: "laliga", text: "LA LIGA" },
        { val: "ligue1", text: "LIGUE 1" },
        { val: "bundesliga", text: "BUNDESLIGA" },
        { val: "seriea", text: "SERIE A" }
      ]
    };

    function updateMarkets() {
      const league = document.getElementById("league").value;
      const marketSelect = document.getElementById("market");
      const sourceSelect = document.getElementById("source");
      marketSelect.innerHTML = "";

      if (!league || !MARKET_MAP[league]) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "-- placeholder --";
        marketSelect.appendChild(opt);
        return;
      }

      for (const m of MARKET_MAP[league]) {
        const opt = document.createElement("option");
        if (typeof m === 'object') {
          opt.value = m.val;
          opt.textContent = m.text;
        } else {
          opt.value = m;
          opt.textContent = m;
        }
        marketSelect.appendChild(opt);
      }

      if (league === "final_soccer_scores") {
        sourceSelect.value = "Scores";
      }
    }

    async function dispatch() {
      const league = document.getElementById("league").value.trim();
      const market = document.getElementById("market").value.trim();
      const source = document.getElementById("source").value.trim();
      const token  = document.getElementById("token").value.trim();
      const raw    = document.getElementById("raw").value;
      const out    = document.getElementById("out");
      const btn    = document.getElementById("btn");

      out.textContent = "";

      if (!league || !source || !token || !raw.trim()) {
        out.textContent = "Major Failure Bro";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Submitting...";

      try {
        const url = `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`;

        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            ref: REF,
            inputs: {
              league: league,
              market: market,
              source: source,
              raw_text: raw
            }
          })
        });

        if (res.status === 204) {
          out.textContent = "Successfully Submitted";
        } else {
          out.textContent = "Major Failure Bro";
        }

      } catch (e) {
        out.textContent = "Major Failure Bro";
      } finally {
        btn.disabled = false;
        btn.textContent = "Create File";
      }
    }
  </script>
</body>
</html>
