<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Data Dump</title>
  <link rel="stylesheet" href="css/matstheme.css" />
  <style>
    .row { display: flex; gap: 16px; margin-bottom: 20px; }
    .row > div { flex: 1; }
    
    label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    
    /* COMBINED STYLE: Custom Arrow + Underline + Glow */
    select, input, textarea {
      width: 100%;
      background: var(--bg-card);
      color: var(--text-main);
      padding: 12px;
      font-family: inherit;
      border-radius: 4px 4px 0 0; /* Rounded top, flat bottom */
      border: none;
      border-bottom: 2px solid var(--border-soft);
      transition: all 0.2s ease;
      appearance: none; /* Removes default browser arrow */
    }

    /* CUSTOM GREEN ARROW for dropdowns */
    select {
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300ff84'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 18px;
      padding-right: 40px;
    }

    /* NEON GLOW FOCUS */
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-bottom-color: var(--accent-green);
      background: #161b22; /* Slightly lighter background on focus */
      box-shadow: 0 4px 12px -4px rgba(0, 255, 132, 0.3);
    }

    textarea { height: 180px; resize: none; border-radius: 4px; border: 1px solid var(--border-soft); }
    textarea:focus { border-color: var(--accent-green); }

    button {
      background: var(--accent-green);
      color: var(--background);
      border: none;
      padding: 14px;
      font-weight: 900;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: transform 0.1s;
    }

    button:active { transform: scale(0.98); }
    button:disabled { background: var(--text-muted); opacity: 0.5; }

    #out { margin-top: 20px; color: var(--accent-yellow); font-family: monospace; text-align: center; font-weight: bold; }
    h2 { color: var(--accent-green); margin-bottom: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Data Dump</h2>

    <div class="row">
      <div>
        <label for="league">League</label>
        <select id="league" onchange="updateMarkets()">
          <option value="">-- select --</option>
          <option value="basketball">Basketball</option>
          <option value="football">Football</option>
          <option value="baseball">Baseball</option>
          <option value="hockey">Hockey</option>
          <option value="soccer">Soccer</option>
          <option value="final_scores">Final Scores</option>
          <option value="final_soccer_scores">Final Soccer Scores</option>
        </select>
      </div>

      <div>
        <label for="market">Market</label>
        <select id="market">
          <option value="">-- placeholder --</option>
        </select>
      </div>

      <div>
        <label for="source">Source</label>
        <select id="source">
          <option value="">-- select --</option>
          <option value="DraftKings">DraftKings</option>
          <option value="Predictions">Predictions</option>
          <option value="Scores">Scores</option>
        </select>
      </div>
    </div>

    <label for="token">Magic</label>
    <input id="token" type="password" placeholder="••••••••" />

    <label for="raw" style="margin-top:20px;">Raw Text</label>
    <textarea id="raw" placeholder="Paste JSON or CSV data here..."></textarea>

    <button id="btn" onclick="dispatch()">Create File</button>
    <div id="out"></div>
  </div>

  <script>
    // ... (Keep existing script logic same as before) ...
    const OWNER = "Clownworldenjoyer76";
    const REPO  = "bet_tracker";
    const WORKFLOW_FILE = "_00_manual_data.yml";
    const REF = "main";

    const MARKET_MAP = {
      basketball: ["NBA", "NCAA Men"],
      football: ["NFL", "NCAA", "CFL"],
      baseball: ["MLB"],
      hockey: ["NHL"],
      soccer: ["MLS", "EPL", "Ligue 1", "Serie A", "La Liga", "Bundesliga"],
      final_scores: ["NBA", "NCAAB", "NHL"],
      final_soccer_scores: [
        { val: "epl", text: "EPL" },
        { val: "laliga", text: "LA LIGA" },
        { val: "ligue1", text: "LIGUE 1" },
        { val: "bundesliga", text: "BUNDESLIGA" },
        { val: "seriea", text: "SERIE A" }
      ]
    };

    function updateMarkets() {
      const league = document.getElementById("league").value;
      const marketSelect = document.getElementById("market");
      const sourceSelect = document.getElementById("source");
      marketSelect.innerHTML = "";
      if (!league || !MARKET_MAP[league]) {
        const opt = document.createElement("option");
        opt.value = ""; opt.textContent = "-- placeholder --";
        marketSelect.appendChild(opt);
        return;
      }
      for (const m of MARKET_MAP[league]) {
        const opt = document.createElement("option");
        if (typeof m === 'object') {
          opt.value = m.val; opt.textContent = m.text;
        } else {
          opt.value = m; opt.textContent = m;
        }
        marketSelect.appendChild(opt);
      }
      if (league === "final_soccer_scores") { sourceSelect.value = "Scores"; }
    }

    async function dispatch() {
      const league = document.getElementById("league").value.trim();
      const market = document.getElementById("market").value.trim();
      const source = document.getElementById("source").value.trim();
      const token  = document.getElementById("token").value.trim();
      const raw    = document.getElementById("raw").value;
      const out    = document.getElementById("out");
      const btn    = document.getElementById("btn");
      out.textContent = "";
      if (!league || !source || !token || !raw.trim()) {
        out.textContent = "Major Failure Bro";
        return;
      }
      btn.disabled = true;
      btn.textContent = "Submitting...";
      try {
        const url = `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`;
        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            ref: REF,
            inputs: { league, market, source, raw_text: raw }
          })
        });
        if (res.status === 204) { out.textContent = "Successfully Submitted"; } 
        else { out.textContent = "Major Failure Bro"; }
      } catch (e) { out.textContent = "Major Failure Bro"; } 
      finally {
        btn.disabled = false;
        btn.textContent = "Create File";
      }
    }
  </script>
</body>
</html>
