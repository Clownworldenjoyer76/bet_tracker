<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Data Dump</title>
  <link rel="stylesheet" href="css/matstheme.css" />
  <style>
    .row { display: flex; gap: 16px; margin-bottom: 20px; }
    .row > div { flex: 1; }
    
    label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    
    select, input, textarea {
      width: 100%;
      background: var(--bg-card);
      color: var(--text-main);
      padding: 12px;
      font-family: inherit;
      border-radius: 4px;
      border: none;
      border-bottom: 2px solid var(--border-soft);
      transition: all 0.2s ease;
      appearance: none;
    }

    select {
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300ff84'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 18px;
    }

    select:focus, input:focus, textarea:focus {
      outline: none;
      border-bottom-color: var(--accent-green);
      box-shadow: 0 4px 12px -4px rgba(0, 255, 132, 0.3);
    }

    textarea { height: 200px; resize: none; border: 1px solid var(--border-soft); }

    /* THE PULSE ANIMATION */
    @keyframes pulse-yellow {
      0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); }
      100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
    }

    button {
      background: var(--accent-green);
      color: var(--background);
      border: none;
      padding: 14px;
      font-weight: 900;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }

    /* Pulse State */
    button.submitting {
      background: var(--bg-card) !important;
      color: var(--accent-yellow) !important;
      border: 1px solid var(--accent-yellow);
      animation: pulse-yellow 1.5s infinite;
      cursor: wait;
    }

    #out { margin-top: 20px; font-family: monospace; font-weight: bold; text-align: center; }
    .success { color: var(--accent-green); }
    .failure { color: var(--accent-red); }
  </style>
</head>
<body>
  <div class="container">
    <h2>Data Dump</h2>

    <div class="row">
      <div>
        <label for="league">League</label>
        <select id="league" onchange="updateMarkets()">
          <option value="">-- select --</option>
          <option value="basketball">Basketball</option>
          <option value="football">Football</option>
          <option value="baseball">Baseball</option>
          <option value="hockey">Hockey</option>
          <option value="soccer">Soccer</option>
          <option value="final_scores">Final Scores</option>
          <option value="final_soccer_scores">Final Soccer Scores</option>
        </select>
      </div>
      <div>
        <label for="market">Market</label>
        <select id="market"><option value="">-- placeholder --</option></select>
      </div>
      <div>
        <label for="source">Source</label>
        <select id="source">
          <option value="">-- select --</option>
          <option value="DraftKings">DraftKings</option>
          <option value="Predictions">Predictions</option>
          <option value="Scores">Scores</option>
        </select>
      </div>
    </div>

    <label for="token">Magic</label>
    <input id="token" type="password" placeholder="••••••••" />

    <label for="raw" style="margin-top:20px;">Raw Text</label>
    <textarea id="raw"></textarea>

    <button id="btn" onclick="dispatch()">Create File</button>
    <div id="out"></div>
  </div>

  <script>
    const OWNER = "Clownworldenjoyer76";
    const REPO  = "bet_tracker";
    const WORKFLOW_FILE = "_00_manual_data.yml";
    const REF = "main";

    const MARKET_MAP = {
      basketball: ["NBA", "NCAA Men"],
      football: ["NFL", "NCAA", "CFL"],
      baseball: ["MLB"],
      hockey: ["NHL"],
      soccer: ["MLS", "EPL", "Ligue 1", "Serie A", "La Liga", "Bundesliga"],
      final_scores: ["NBA", "NCAAB", "NHL"],
      final_soccer_scores: [
        { val: "epl", text: "EPL" }, { val: "laliga", text: "LA LIGA" },
        { val: "ligue1", text: "LIGUE 1" }, { val: "bundesliga", text: "BUNDESLIGA" },
        { val: "seriea", text: "SERIE A" }
      ]
    };

    function updateMarkets() {
      const l = document.getElementById("league").value;
      const mSel = document.getElementById("market");
      const sSel = document.getElementById("source");
      mSel.innerHTML = "";
      if (!l || !MARKET_MAP[l]) {
        mSel.innerHTML = "<option value=''>-- placeholder --</option>";
        return;
      }
      MARKET_MAP[l].forEach(m => {
        const opt = document.createElement("option");
        opt.value = typeof m === 'object' ? m.val : m;
        opt.textContent = typeof m === 'object' ? m.text : m;
        mSel.appendChild(opt);
      });
      if (l === "final_soccer_scores") sSel.value = "Scores";
    }

    async function dispatch() {
      const league = document.getElementById("league").value.trim();
      const market = document.getElementById("market").value.trim();
      const source = document.getElementById("source").value.trim();
      const token  = document.getElementById("token").value.trim();
      const raw    = document.getElementById("raw").value;
      const out    = document.getElementById("out");
      const btn    = document.getElementById("btn");

      if (!league || !source || !token || !raw.trim()) {
        out.className = "failure";
        out.textContent = "Major Failure Bro";
        return;
      }

      // Start Pulse
      btn.classList.add("submitting");
      btn.disabled = true;
      btn.textContent = "Processing...";
      out.textContent = "";

      try {
        const url = `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`;
        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ ref: REF, inputs: { league, market, source, raw_text: raw } })
        });

        if (res.status === 204) {
          out.className = "success";
          out.textContent = "Successfully Submitted";
        } else {
          throw new Error();
        }
      } catch (e) {
        out.className = "failure";
        out.textContent = "Major Failure Bro";
      } finally {
        btn.classList.remove("submitting");
        btn.disabled = false;
        btn.textContent = "Create File";
      }
    }
  </script>
</body>
</html>
