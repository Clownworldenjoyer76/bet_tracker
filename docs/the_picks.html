<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Picks</title>
<link rel="stylesheet" href="css/matstheme.css">
<style>
    /* 1. Loading State: Pulse + Scan Line */
    .loading-pulse {
        animation: status-glow 1.5s infinite;
        font-weight: bold;
        letter-spacing: 1px;
    }

    @keyframes status-glow {
        0% { color: var(--accent-yellow); opacity: 1; }
        50% { color: var(--accent-green); opacity: 0.5; }
        100% { color: var(--accent-yellow); opacity: 1; }
    }

    /* Scanning animation for the games container when loading */
    #games.loading::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: var(--accent-green);
        box-shadow: 0 0 10px var(--accent-green);
        animation: scan 2s linear infinite;
        z-index: 10;
    }

    @keyframes scan {
        0% { top: 0%; }
        100% { top: 100%; }
    }

    /* 2. Glassmorphism Card Style */
    .pick-card {
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease, border-color 0.25s ease;
        background: rgba(15, 20, 27, 0.8) !important; /* Slightly transparent bg */
        backdrop-filter: blur(5px);
        border: 1px solid var(--border-soft);
        position: relative;
    }

    .pick-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 255, 132, 0.15);
        border-color: var(--accent-green);
        background: rgba(22, 27, 34, 0.9) !important;
    }

    /* 3. Glowing Filter Pills */
    .filters {
        display: flex;
        gap: 12px;
        margin-bottom: 25px;
        flex-wrap: wrap;
    }

    .filter-pill {
        padding: 6px 16px;
        border: 1px solid var(--border-soft);
        border-radius: 4px; /* Squared off to match matstheme */
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        color: var(--text-muted);
        transition: all 0.2s ease;
        background: var(--bg-card);
    }

    .filter-pill.active {
        border-color: var(--accent-green);
        color: var(--accent-green);
        background: rgba(0, 255, 132, 0.05);
        box-shadow: 0 0 10px rgba(0, 255, 132, 0.2);
    }

    /* 4. Styled Date Input */
    input[type="date"] {
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        color: var(--text-main);
        padding: 8px 12px;
        font-family: inherit;
        border-radius: 4px;
        outline: none;
    }

    input[type="date"]:focus {
        border-color: var(--accent-green);
        box-shadow: 0 0 5px rgba(0, 255, 132, 0.2);
    }

    /* 5. Modal Backdrop Blur */
    .modal {
        backdrop-filter: blur(8px);
        transition: opacity 0.3s ease;
    }

    .modal-card {
        border: 1px solid var(--accent-green);
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    /* Layout Utilities */
    .league-grid {
        position: relative; /* Necessary for the scan line */
        min-height: 200px;
    }
</style>
</head>

<body>
<div class="container">

    <h1>Picks</h1>

    <div id="nav-placeholder"></div>

    <section class="controls">
        <div class="row">
            <div>
                <label style="display:block; margin-bottom:8px; font-size:11px; color:var(--text-muted); text-transform:uppercase;">Select Date:</label>
                <input id="p-date" type="date">
            </div>
        </div>
    </section>

    <div class="filters" id="league-filters">
        <div class="filter-pill active" onclick="filterLeague('all')">All Leagues</div>
    </div>

    <div id="status" class="status"></div>

    <div id="games" class="league-grid"></div>

</div>

<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div id="modal-content"></div>
    <button class="secondary-btn" style="margin-top:20px; width:100%; background:var(--accent-green); color:var(--background); border:none; padding:12px; font-weight:bold; cursor:pointer; text-transform:uppercase;" onclick="closeModal()">Close Details</button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/nav.js"></script>
<script>
    const statusEl = document.getElementById('status');
    const gamesContainer = document.getElementById('games');
    const modal = document.getElementById('modal');

    // Show pulse and scan line when loading
    function setStatusLoading(msg) {
        statusEl.textContent = msg;
        statusEl.classList.add('loading-pulse');
        gamesContainer.classList.add('loading');
    }

    function setStatusReady(msg) {
        statusEl.textContent = msg;
        statusEl.classList.remove('loading-pulse');
        gamesContainer.classList.remove('loading');
    }

    // Modal Controls
    function openModal(contentHtml) {
        document.getElementById('modal-content').innerHTML = contentHtml;
        modal.classList.add('open');
    }

    function closeModal() {
        modal.classList.remove('open');
    }

    // Close modal on background click
    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }
</script>
<script src="js/app.js"></script>
</body>
</html>
