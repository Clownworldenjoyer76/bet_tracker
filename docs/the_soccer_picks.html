<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soccer Picks</title>
    <link rel="stylesheet" href="css/matstheme.css">
    <style>
        /* Ensures the single master column layout */
        .master-column {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>
<div class="container">

    <h1>Soccer Picks</h1>

    <div id="nav-placeholder"></div>

    <section class="controls">
        <label for="p-date">Date:</label>
        <input id="p-date" type="date">
    </section>

    <div id="status" class="status"></div>

    <div id="games" class="master-column">
        </div>

</div>

<script src="js/config.js"></script>
<script src="js/nav.js"></script>
<script src="js/app.js"></script>
</body>
</html>
