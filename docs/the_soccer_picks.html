<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soccer Picks</title>
    <link rel="stylesheet" href="css/matstheme.css">
    <style>
        .master-column { max-width: 800px; margin: 20px auto; display: flex; flex-direction: column; gap: 10px; }
        .pick-card { border: 1px solid #444; padding: 15px; background: #111; border-radius: 4px; color: #eee; }
        .pick-header { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 8px; color: #fff; }
        .pick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .bet-text { color: #00ff00; font-weight: bold; }
        .league-label { color: #aaa; font-size: 0.85em; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .status { color: #ffca28; margin: 10px 0; font-family: monospace; }
    </style>
</head>

<body>
<div class="container">
    <h1>Soccer Picks</h1>
    <div id="nav-placeholder"></div>

    <section class="controls">
        <label>Date:</label>
        <input id="p-date" type="date">
    </section>

    <div id="status" class="status"></div>
    <div id="games" class="master-column"></div>
</div>

<script src="js/config.js"></script>
<script src="js/nav.js"></script>

<script>
    const dateInput = document.getElementById('p-date');
    const container = document.getElementById('games');
    const status = document.getElementById('status');

    const leagueMap = {
        'bundesliga': 'German Bundesliga',
        'laliga': 'Spain La Liga',
        'ligue1': 'France Ligue 1',
        'epl': 'English Premier League',
        'seriea': 'Italy Serie A'
    };

    function getOrdinal(n) {
        const s = ["th", "st", "nd", "rd"];
        const v = n % 100;
        return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    function formatDate(dateStr) {
        const parts = dateStr.split('_');
        const d = new Date(parts[0], parts[1] - 1, parts[2]);
        const month = d.toLocaleString('en-US', { month: 'long' });
        return `${month} ${getOrdinal(parseInt(parts[2]))}, ${parts[0]}`;
    }

    function formatTime(timeStr) {
        if (!timeStr.includes(':')) return timeStr;
        let [hours, minutes] = timeStr.split(':');
        hours = parseInt(hours);
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        return `${String(hours).padStart(2, '0')}:${minutes} ${ampm} EST`;
    }

    window.addEventListener('DOMContentLoaded', () => {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const today = `${y}-${m}-${d}`;
        dateInput.value = today;
        loadData(today);
    });

    dateInput.addEventListener('change', (e) => loadData(e.target.value));

    async function loadData(dateStr) {
        if (!dateStr) return;
        const formattedDate = dateStr.replace(/-/g, '_');
        const targetFile = `win/soccer/04_select/soccer_${formattedDate}.csv`;
        
        status.textContent = `Loading: ${targetFile}`;
        container.innerHTML = "";

        try {
            const response = await fetch(targetFile);
            if (!response.ok) throw new Error(`File Not Found: ${targetFile}`);

            const text = await response.text();
            const rows = text.split('\n').filter(r => r.trim().length > 0);
            const headers = rows[0].split(',').map(h => h.trim());
            const getIdx = (name) => headers.indexOf(name);

            rows.slice(1).forEach(row => {
                const cols = row.split(',').map(c => c.trim());
                if (cols.length < headers.length) return;

                const away = cols[getIdx('away_team')];
                const home = cols[getIdx('home_team')];
                const marketRaw = cols[getIdx('market')];
                const marketDisplay = leagueMap[marketRaw] || marketRaw;
                const dateDisplay = formatDate(cols[getIdx('match_date')]);
                const timeDisplay = formatTime(cols[getIdx('match_time')]);

                // Updated logic: replace 'away' or 'home' with actual team names
                let rawBet = cols[getIdx('take_bet')];
                let betDisplay = rawBet;

                if (rawBet === 'away') {
                    betDisplay = away;
                } else if (rawBet === 'home') {
                    betDisplay = home;
                } else {
                    betDisplay = rawBet
                        .replace('over25', 'Over 2.5')
                        .replace('under25', 'Under 2.5');
                }
                
                const odds = cols[getIdx('odds_american')];
                const edgePct = (parseFloat(cols[getIdx('edge_pct')]) * 100).toFixed(2);

                const card = document.createElement('div');
                card.className = 'pick-card';
                card.innerHTML = `
                    <div class="league-label">${marketDisplay}</div>
                    <div class="pick-header">
                        <span>${away} at ${home}</span>
                        <span>${timeDisplay}</span>
                    </div>
                    <div class="pick-grid">
                        <div>${dateDisplay}</div>
                        <div class="bet-text">Take ${betDisplay} at ${odds}</div>
                        <div>Edge: ${edgePct}%</div>
                        <div>Kelly: ${cols[getIdx('kelly_stake_pct')]}%</div>
                        <div>Projected Goals: ${cols[getIdx('expected_goals')]}</div>
                    </div>
                `;
                container.appendChild(card);
            });
            status.textContent = "Loaded.";
        } catch (err) {
            status.textContent = err.message;
        }
    }
</script>
</body>
</html>
