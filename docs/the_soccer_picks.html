<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Picks Only</title>
<link rel="stylesheet" href="css/matstheme.css">
<style>
    .master-column { max-width: 800px; margin: 20px auto; }
    .pick-entry { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
    .pick-entry div { margin: 5px 0; }
    .bold { font-weight: bold; }
</style>
</head>

<body>
<div class="container">
    <h1>Soccer Picks</h1>
    <div id="nav-placeholder"></div>

    <section class="controls">
        <label>Date:</label>
        <input id="p-date" type="date">
    </section>

    <div id="status" class="status"></div>
    <div id="games" class="master-column"></div>
</div>

<script src="js/config.js"></script>
<script src="js/nav.js"></script>
<script>
    const dateInput = document.getElementById('p-date');
    const container = document.getElementById('games');
    const status = document.getElementById('status');

    dateInput.addEventListener('change', (e) => {
        const date = e.target.value.replace(/-/g, '');
        // STRICT PATH: Only looks in the soccer folder
        const soccerPath = `win/soccer/04_select/soccer_${date}.csv`;
        fetchSoccerOnly(soccerPath);
    });

    async function fetchSoccerOnly(path) {
        container.innerHTML = "";
        status.textContent = "Fetching Soccer Data...";

        try {
            const response = await fetch(path);
            if (!response.ok) throw new Error("No soccer data found for this date.");

            const text = await response.text();
            const lines = text.split('\n').filter(l => l.trim() !== "");
            const headers = lines[0].split(',');

            // Map headers to indices
            const idx = {};
            headers.forEach((h, i) => idx[h.trim()] = i);

            lines.slice(1).forEach(line => {
                const cols = line.split(',');
                const entry = document.createElement('div');
                entry.className = 'pick-entry';

                // Display only requested fields
                entry.innerHTML = `
                    <div class="bold">${cols[idx.home_team]} vs ${cols[idx.away_team]}</div>
                    <div>Market: ${cols[idx.market]} | Time: ${cols[idx.match_date]} ${cols[idx.match_time]}</div>
                    <div>Bet: <span class="bold">${cols[idx.take_bet]}</span> (@${cols[idx.odds_american]})</div>
                    <div>Edge: ${cols[idx.edge_pct]}% | Kelly: ${cols[idx.kelly_stake_pct]}% | xG: ${cols[idx.expected_goals]}</div>
                `;
                container.appendChild(entry);
            });
            status.textContent = "";
        } catch (err) {
            status.textContent = err.message;
        }
    }
</script>
</body>
</html>
