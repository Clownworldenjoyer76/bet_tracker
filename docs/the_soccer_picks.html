<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soccer Picks Only</title>
    <link rel="stylesheet" href="css/matstheme.css">
    <style>
        .master-column { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .pick-card { border: 1px solid #444; padding: 15px; border-radius: 8px; background: #1a1a1a; }
        .pick-header { font-weight: bold; font-size: 1.1em; border-bottom: 1px solid #333; margin-bottom: 10px; padding-bottom: 5px; color: #fff; }
        .pick-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9em; }
        .bet-highlight { color: #00ff00; font-weight: bold; }
    </style>
</head>

<body>
<div class="container">
    <h1>Soccer Picks</h1>
    <div id="nav-placeholder"></div>

    <section class="controls">
        <label>Date:</label>
        <input id="p-date" type="date">
    </section>

    <div id="status" class="status"></div>
    <div id="games" class="master-column"></div>
</div>

<script src="js/config.js"></script>
<script src="js/nav.js"></script>
<script>
    const dateInput = document.getElementById('p-date');
    const gamesContainer = document.getElementById('games');
    const statusDiv = document.getElementById('status');

    dateInput.addEventListener('change', (e) => {
        const rawDate = e.target.value; // YYYY-MM-DD
        if (!rawDate) return;
        
        const date = rawDate.replace(/-/g, '');
        // HARDCODED PATH: Only looks at soccer CSVs
        const soccerFile = `win/soccer/04_select/soccer_${date}.csv`;
        
        loadSoccerData(soccerFile);
    });

    async function loadSoccerData(filePath) {
        statusDiv.textContent = "Loading Soccer...";
        gamesContainer.innerHTML = "";

        try {
            const response = await fetch(filePath);
            if (!response.ok) throw new Error("No soccer files found for this date.");

            const data = await response.text();
            const rows = data.split('\n').filter(row => row.trim() !== "");
            const headers = rows[0].split(',').map(h => h.trim());
            
            // Map headers to indices for extraction
            const idx = (name) => headers.indexOf(name);

            rows.slice(1).forEach(row => {
                const cols = row.split(',').map(c => c.trim());
                
                const card = document.createElement('div');
                card.className = 'pick-card';
                card.innerHTML = `
                    <div class="pick-header">
                        ${cols[idx('home_team')]} vs ${cols[idx('away_team')]}
                    </div>
                    <div class="pick-details">
                        <div><strong>Market:</strong> ${cols[idx('market')]}</div>
                        <div><strong>Time:</strong> ${cols[idx('match_time')]}</div>
                        <div class="bet-highlight">BET: ${cols[idx('take_bet')]} (@${cols[idx('odds_american')]})</div>
                        <div><strong>Edge:</strong> ${cols[idx('edge_pct')]}%</div>
                        <div><strong>Kelly:</strong> ${cols[idx('kelly_stake_pct')]}%</div>
                        <div><strong>xG:</strong> ${cols[idx('expected_goals')]}</div>
                    </div>
                `;
                gamesContainer.appendChild(card);
            });
            statusDiv.textContent = "";
        } catch (err) {
            statusDiv.textContent = err.message;
        }
    }
</script>
</body>
</html>
