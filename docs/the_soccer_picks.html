<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soccer Picks</title>
    <link rel="stylesheet" href="css/matstheme.css">
    <style>
        .master-column { max-width: 800px; margin: 20px auto; display: flex; flex-direction: column; gap: 10px; }
        .pick-card { border: 1px solid #444; padding: 15px; background: #111; border-radius: 4px; color: #eee; }
        .pick-header { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 8px; color: #fff; }
        .pick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .bet-text { color: #00ff00; font-weight: bold; }
        .status { color: #ffca28; margin: 10px 0; font-family: monospace; }
    </style>
</head>

<body>
<div class="container">
    <h1>Soccer Picks</h1>
    <div id="nav-placeholder"></div>

    <section class="controls">
        <label>Date:</label>
        <input id="p-date" type="date">
    </section>

    <div id="status" class="status"></div>
    <div id="games" class="master-column"></div>
</div>

<script src="js/config.js"></script>
<script src="js/nav.js"></script>

<script>
    const dateInput = document.getElementById('p-date');
    const container = document.getElementById('games');
    const status = document.getElementById('status');

    // Initialize with Today's Date
    window.addEventListener('DOMContentLoaded', () => {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        
        const dateString = `${year}-${month}-${day}`;
        dateInput.value = dateString;
        loadData(dateString);
    });

    // Update on Date Selection
    dateInput.addEventListener('change', (e) => {
        loadData(e.target.value);
    });

    async function loadData(dateStr) {
        if (!dateStr) return;

        // Formats YYYY-MM-DD to YYYY_MM_DD to match your file: soccer_2026_03_07.csv
        const formattedDate = dateStr.replace(/-/g, '_');
        const targetFile = `win/soccer/04_select/soccer_${formattedDate}.csv`;
        
        status.textContent = `Loading: ${targetFile}`;
        container.innerHTML = "";

        try {
            const response = await fetch(targetFile);
            if (!response.ok) throw new Error(`File Not Found: ${targetFile}`);

            const text = await response.text();
            const rows = text.split('\n').filter(r => r.trim().length > 0);
            const headers = rows[0].split(',').map(h => h.trim());
            
            const getIdx = (name) => headers.indexOf(name);

            rows.slice(1).forEach(row => {
                const cols = row.split(',').map(c => c.trim());
                if (cols.length < headers.length) return;

                const card = document.createElement('div');
                card.className = 'pick-card';
                card.innerHTML = `
                    <div class="pick-header">
                        <span>${cols[getIdx('home_team')]} vs ${cols[getIdx('away_team')]}</span>
                        <span>${cols[getIdx('match_time')]}</span>
                    </div>
                    <div class="pick-grid">
                        <div><strong>Market:</strong> ${cols[getIdx('market')]}</div>
                        <div><strong>Date:</strong> ${cols[getIdx('match_date')]}</div>
                        <div class="bet-text">BET: ${cols[getIdx('take_bet')]} (@${cols[getIdx('odds_american')]})</div>
                        <div><strong>Edge:</strong> ${cols[getIdx('edge_pct')]}%</div>
                        <div><strong>Kelly:</strong> ${cols[getIdx('kelly_stake_pct')]}%</div>
                        <div><strong>xG:</strong> ${cols[getIdx('expected_goals')]}</div>
                    </div>
                `;
                container.appendChild(card);
            });
            status.textContent = "Results Loaded.";
        } catch (err) {
            status.textContent = err.message;
        }
    }
</script>
</body>
</html>
