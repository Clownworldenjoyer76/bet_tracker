name: _01 Merge Intake

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scipy

      # =========================
      # SOCCER
      # =========================

      - name: Run Soccer merge
        run: |
          python docs/win/soccer/scripts/01_merge/merge_intake.py

      - name: Validate Soccer merge
        run: |
          python docs/win/soccer/scripts/01_merge/validate_merge.py

      # =========================
      # HOCKEY
      # =========================

      - name: Run Hockey merge
        run: |
          python docs/win/hockey/scripts/01_merge/merge_intake.py

      - name: Build Hockey Juice Files
        run: |
          python docs/win/hockey/scripts/01_merge/build_juice_files.py

      # =========================
      # BASKETBALL
      # =========================

      - name: Run Basketball merge
        run: |
          python docs/win/basketball/scripts/01_merge/merge_intake.py

      - name: Build Basketball Juice Files
        run: |
          python docs/win/basketball/scripts/01_merge/build_juice_files.py

      # =========================
      # COMMIT
      # =========================

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "Merge + Juice rebuild (all sports)"
            git push
          else
            echo "No changes detected"
          fi
