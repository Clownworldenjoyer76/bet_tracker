name: _01 Merge Intake

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scipy

      # =========================
      # SOCCER
      # =========================

      - name: Ensure soccer model output folder exists
        run: |
          mkdir -p docs/win/soccer/01_merge/market_model

      - name: Run Soccer merge
        run: |
          python docs/win/soccer/scripts/01_merge/merge_intake.py

      - name: Validate Soccer merge
        run: |
          MERGE_DIR="docs/win/soccer/01_merge"

          if [ -d "$MERGE_DIR" ]; then
            for f in $MERGE_DIR/soccer_*.csv; do
              if [ -f "$f" ]; then
                DATE=$(basename "$f" | sed 's/soccer_//' | sed 's/.csv//')
                echo "Validating soccer slate $DATE"
                python docs/win/soccer/scripts/01_merge/validate_merge.py $DATE
              fi
            done
          else
            echo "No soccer merge directory found"
          fi

      - name: Run Soccer Market Model
        run: |
          python docs/win/soccer/scripts/01_merge/market_model.py

      # =========================
      # HOCKEY
      # =========================

      - name: Run Hockey merge
        run: |
          python docs/win/hockey/scripts/01_merge/merge_intake.py

      - name: Build Hockey Juice Files
        run: |
          python docs/win/hockey/scripts/01_merge/build_juice_files.py

      # =========================
      # BASKETBALL
      # =========================

      - name: Run Basketball merge
        run: |
          python docs/win/basketball/scripts/01_merge/merge_intake.py

      - name: Build Basketball Juice Files
        run: |
          python docs/win/basketball/scripts/01_merge/build_juice_files.py

      # =========================
      # COMMIT
      # =========================

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git

          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Merge + market model rebuild (all sports)"
            git push
          fi
