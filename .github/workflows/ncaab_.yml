name: NCAAB Calibration

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  calibrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas numpy scikit-learn scipy openpyxl

      - name: Run calibration
        run: python scripts/ncaab_calibrate_full.py

      - name: Commit calibration output
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add bets/historic/NCAA\ MENS\ BASKETBALL/calibration_summary.csv
          git add bets/historic/NCAA\ MENS\ BASKETBALL/calibration_summary.xlsx
          git commit -m "Update NCAAB calibration results" || echo "No changes"
          git push
