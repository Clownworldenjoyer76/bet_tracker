name: NCAAB Calibrate (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  calibrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run NCAAB Calibration Script
        run: |
          python scripts/ncaab_calibrate_full.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add bets/historic/NCAA\ MENS\ BASKETBALL/ncaab_spreads_juice.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Update NCAAB spreads juice file"
          git push
