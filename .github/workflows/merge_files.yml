name: Run Merge Scripts

on:
  workflow_dispatch:

jobs:
  run-merges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install pandas

      # Ensure all output folders exist
      - name: Ensure output directories exist
        run: |
          mkdir -p scripts/errors_log
          mkdir -p docs/win/basketball/00_intake/sportsbook/merged
          mkdir -p docs/win/basketball/00_intake/predictions/merged
          mkdir -p docs/win/basketball/03_edges/merged
          mkdir -p docs/win/basketball/04_select/merged

      # Run merge scripts
      - name: Run DK NBA merge
        run: python scripts/merge_scripts/merge_folder_files_00_dk_NBA.py

      - name: Run DK NCAAB merge
        run: python scripts/merge_scripts/merge_folder_files_00_dk_NCAAB.py

      - name: Run Predictions NBA merge
        run: python scripts/merge_scripts/merge_folder_files_00_pred_NBA.py

      - name: Run Predictions NCAAB merge
        run: python scripts/merge_scripts/merge_folder_files_00_pred_NCAAB.py

      - name: Run Edges merge
        run: python scripts/merge_scripts/merge_folder_files_03_basketball_edges.py

      - name: Run Select merge
        run: python scripts/merge_scripts/merge_folder_files_04_basketball_select.py

      # Commit outputs
      - name: Commit merged outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add scripts/errors_log/
          git add docs/win/basketball/00_intake/sportsbook/merged/
          git add docs/win/basketball/00_intake/predictions/merged/
          git add docs/win/basketball/03_edges/merged/
          git add docs/win/basketball/04_select/merged/

          git commit -m "Automated basketball merge outputs" || echo "No changes to commit"
          git push
