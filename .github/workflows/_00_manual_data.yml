name: _00 Manual Data Text Intake

on:
  workflow_dispatch:
    inputs:
      league:
        required: true
        type: string
      market:
        required: true
        type: string
      source:
        required: true
        type: string
      raw_text:
        required: true
        type: string

permissions:
  contents: write

jobs:
  intake:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install pandas numpy

      # =========================
      # BASKETBALL
      # =========================
      - name: Run Basketball
        if: ${{ github.event.inputs.league == 'basketball' }}
        run: |
          printf "%s" "${{ github.event.inputs.raw_text }}" > dump.txt
          BASE="docs/win/basketball/scripts/00_parsing"
          if [ "${{ github.event.inputs.source }}" = "DraftKings" ]; then
            python "$BASE/dk.py" basketball "${{ github.event.inputs.market }}" dump.txt
          else
            python "$BASE/drat.py" basketball "${{ github.event.inputs.market }}" dump.txt
          fi
          python "$BASE/name_normalization.py"
          python "$BASE/dedupe.py"

      # =========================
      # HOCKEY
      # =========================
      - name: Run Hockey
        if: ${{ github.event.inputs.league == 'hockey' }}
        run: |
          printf "%s" "${{ github.event.inputs.raw_text }}" > dump.txt
          BASE="docs/win/hockey/scripts/00_parsing"
          if [ "${{ github.event.inputs.source }}" = "DraftKings" ]; then
            python "$BASE/dk.py" hockey "${{ github.event.inputs.market }}" dump.txt
          else
            python "$BASE/drat.py" hockey "${{ github.event.inputs.market }}" dump.txt
          fi
          python "$BASE/name_normalization.py"
          python "$BASE/dedupe.py"

      # =========================
      # SOCCER
      # =========================
      - name: Run Soccer
        if: ${{ github.event.inputs.league == 'soccer' }}
        run: |
          printf "%s" "${{ github.event.inputs.raw_text }}" > dump.txt
          BASE="docs/win/soccer/scripts/00_parsing"
          if [ "${{ github.event.inputs.source }}" = "DraftKings" ]; then
            python "$BASE/dk.py" soccer "${{ github.event.inputs.market }}" dump.txt
          else
            python "$BASE/drat.py" soccer "${{ github.event.inputs.market }}" dump.txt
          fi
          python "$BASE/name_normalization.py"
          python "$BASE/dedupe.py"

      # =========================
      # FINAL SCORES
      # =========================
      - name: Run Final Scores
        if: ${{ github.event.inputs.league == 'final_scores' }}
        run: |
          printf "%s" "${{ github.event.inputs.raw_text }}" > dump.txt
          BASE="docs/win/final_scores/scripts/00_parsing"
          python "$BASE/scores.py" "${{ github.event.inputs.market }}" dump.txt
          python "$BASE/dedupe.py"
          python "$BASE/dk_puck.py"

      # =========================
      # FINAL SOCCER SCORES
      # =========================
      - name: Run Final Soccer Scores
        if: ${{ github.event.inputs.league == 'final_soccer_scores' }}
        run: |
          printf "%s" "${{ github.event.inputs.raw_text }}" > dump.txt
          BASE="docs/win/final_scores/scripts/00_parsing"
          python "$BASE/soccer_scores.py" "${{ github.event.inputs.market }}" dump.txt

      # =========================
      # BUILD SOCCER MASTER FILE
      # =========================
      - name: Build Soccer Master Scores
        if: ${{ github.event.inputs.league == 'final_soccer_scores' }}
        run: |
          python docs/win/final_scores/scripts/05_results/soccer_master.py

      # =========================
      # COMMITS
      # =========================
      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Add all potential output directories
          git add docs/win/basketball/00_intake/ mappings/basketball/no_map/ docs/win/basketball/errors/ || true
          git add docs/win/hockey/00_intake/ mappings/hockey/no_map/ docs/win/hockey/errors/ || true
          git add docs/win/soccer/00_intake/ mappings/soccer/no_map/ docs/win/soccer/errors/ || true
          git add docs/win/final_scores/results/ docs/win/final_scores/errors/ || true

          git commit -m "manual data intake: ${{ github.event.inputs.league }} - ${{ github.event.inputs.market }}" || echo "No changes"
          git push
