name: DK Puck Injection (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dk-puck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run DK Puck Script
        run: |
          python docs/win/final_scores/scripts/dk_puck.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Updated final score files
          git add docs/win/final_scores/*.csv || true

          # Error log
          git add docs/win/final_scores/errors/*.txt || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "DK puck injection run"
            git push
          fi
