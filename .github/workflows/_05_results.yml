name: _05_Run All Results Script

on:
  workflow_dispatch: # Manual trigger from the Actions tab

jobs:
  run-batch-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pandas
        run: pip install pandas

      - name: Run Combined Results Script
        run: python docs/win/final_scores/scripts/05_results/results.py

      - name: Run Summary Tally Script
        run: python docs/win/final_scores/scripts/05_results/generate_summary.py

      - name: Commit and Push All Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Stage entire final_scores results tree (handles all subfolders)
          git add docs/win/final_scores/results/

          # Stage any errors if created
          git add docs/win/final_scores/errors/ || true

          git commit -m "Auto-update: All Sports results and summary tallies" || echo "No changes to commit"
          git push
