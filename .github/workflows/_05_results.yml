name: _05_Run NHL Results Script

on:
  workflow_dispatch: # Manual trigger from the Actions tab

jobs:
  run-batch-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pandas
        run: pip install pandas

      - name: Run Results Script
        run: python docs/win/final_scores/scripts/05_results/NHL_results.py

      - name: Run Summary Tally Script
        run: python docs/win/final_scores/scripts/05_results/generate_summary.py

      - name: Commit and Push All Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/win/final_scores/results/*.csv
          git commit -m "Auto-update: All NHL results and summary tally" || echo "No changes to commit"
          git push
