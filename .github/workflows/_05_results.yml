name: _05_Run All Results Script

on:
  workflow_dispatch:

jobs:
  run-batch-process:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install pandas numpy

      - name: Run Combined Results Script
        run: |
          python docs/win/final_scores/scripts/05_results/results.py

      - name: Run Summary Tally Script
        run: |
          python docs/win/final_scores/scripts/05_results/generate_summary.py

      - name: Show Git Changes (debug)
        run: |
          echo "---- GIT STATUS ----"
          git status
          echo "---- GIT DIFF ----"
          git diff || true

      - name: Commit and Push All Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Stage all modified / new files
          git add -A

          # Commit if anything changed
          git diff --staged --quiet || git commit -m "Auto-update: All Sports results and summary tallies"

          # Push changes
          git push
