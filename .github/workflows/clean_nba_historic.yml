name: Clean NBA Historic Data

on:
  workflow_dispatch:

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas

      - name: Run cleaning script
        run: |
          python bets/historic/scripts/clean_nba_historic.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add bets/historic/clean/*.csv

          git commit -m "Update cleaned NBA historic data" || echo "No changes"

          git push
